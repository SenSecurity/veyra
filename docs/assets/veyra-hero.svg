<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Veyra — Glacier desktop dictation</title>
  <desc id="desc">Veyra brand mark with cyan V waveform and warm spark, set on a soft ice-blue gradient with a floating recording capsule preview.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f6f9fc"/>
      <stop offset="50%" stop-color="#e1ebf6"/>
      <stop offset="100%" stop-color="#c9dceb"/>
    </linearGradient>
    <radialGradient id="halo-cyan" cx="0.18" cy="0.2" r="0.55">
      <stop offset="0%" stop-color="rgba(43,199,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(43,199,255,0)"/>
    </radialGradient>
    <radialGradient id="halo-spark" cx="0.85" cy="0.85" r="0.5">
      <stop offset="0%" stop-color="rgba(255,180,84,0.18)"/>
      <stop offset="100%" stop-color="rgba(255,180,84,0)"/>
    </radialGradient>

    <radialGradient id="orb-bg" cx="0.3" cy="0.18" r="0.95">
      <stop offset="0%" stop-color="#3a4658"/>
      <stop offset="40%" stop-color="#1a212e"/>
      <stop offset="100%" stop-color="#07090d"/>
    </radialGradient>
    <linearGradient id="vbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a4e6ff"/>
      <stop offset="50%" stop-color="#2bc7ff"/>
      <stop offset="100%" stop-color="#0a8bc4"/>
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#fff1d0"/>
      <stop offset="40%" stop-color="#ffb454"/>
      <stop offset="100%" stop-color="#ff8a1f" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="capsule-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#f1f5fa" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="cap-shadow" x="-20%" y="-50%" width="140%" height="200%">
      <feGaussianBlur stdDeviation="14" />
    </filter>
    <filter id="orb-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="22" />
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect width="1280" height="640" fill="url(#halo-cyan)"/>
  <rect width="1280" height="640" fill="url(#halo-spark)"/>

  <g stroke="rgba(12,17,28,0.04)" stroke-width="1">
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
  </g>

  <g font-family="Inter Tight, system-ui, sans-serif">
    <text x="100" y="150" font-size="14" letter-spacing="3.5" fill="#0a8bc4" font-weight="500">VEYRA · GLACIER · v0.1.17</text>
    <text x="100" y="240" font-size="84" font-weight="500" fill="#0d1320" letter-spacing="-2.5">Speak. Watch words appear.</text>
    <text x="100" y="288" font-size="44" font-weight="300" fill="#0a8bc4" font-style="italic" font-family="Newsreader, Inter Tight, serif" letter-spacing="-1">— quiet desk, ready when you are.</text>
    <text x="100" y="350" font-size="20" fill="#4d6480" letter-spacing="-0.2">Local Whisper. Local Llama. Two hotkeys. Nothing leaves your machine.</text>
  </g>

  <g transform="translate(940, 110)" filter="url(#orb-shadow)">
    <rect x="6" y="6" width="220" height="220" rx="48" fill="rgba(12,17,28,0.35)"/>
  </g>
  <g transform="translate(940, 100)">
    <rect width="220" height="220" rx="48" fill="url(#orb-bg)"/>
    <path d="M 14 14 Q 14 6 22 6 L 198 6 Q 206 6 206 14 L 206 86 Q 206 130 110 130 Q 14 130 14 86 Z" fill="rgba(255,255,255,0.18)"/>

    <g fill="url(#vbar)">
      <rect x="34" y="50" width="6" height="92" rx="3"/>
      <rect x="48" y="58" width="6" height="84" rx="3"/>
