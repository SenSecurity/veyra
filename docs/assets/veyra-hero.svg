    <rect x="34" y="148" width="158" height="1.2" fill="rgba(164,230,255,0.5)"/>

    <ellipse cx="110" cy="178" rx="22" ry="34" fill="url(#spark)"/>
    <rect x="108" y="146" width="4" height="32" rx="2" fill="#ffb454"/>
  </g>

  <g transform="translate(100, 430)">
